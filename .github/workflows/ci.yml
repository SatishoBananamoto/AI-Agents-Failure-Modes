name: verifier-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Show repository state
        run: |
          python --version
          pwd
          find . -maxdepth 3 -type f | sort

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with diagnostics
        run: pytest -vv --tb=short

      - name: Verify fixture through CLI
        run: python -m app.cli tests/fixtures/pass_basic.json

      - name: Build Docker image
        run: docker build -t icif-verifier:ci .
